<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playwright 智能抓包 - SMSBoom</title>
    <!-- 使用国内 Staticfile CDN 加载 Bootstrap 4 -->
    <link href="https://cdn.staticfile.org/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* 强制显示 FontAwesome 图标 */
        .fas, .far, .fab, .fa {
            font-family: "Font Awesome 5 Free" !important;
            font-weight: 900;
        }
    </style>
    <style>
        body { background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .container-fluid { padding: 20px; }
        .card { border: none; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .card-header { background-color: #fff; border-bottom: 1px solid #f0f0f0; font-weight: bold; padding: 12px 20px; }
        
        /* 日志区域 */
        #log-container {
            height: 200px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            overflow-y: auto;
            border-radius: 4px;
            line-height: 1.4;
        }
        .log-entry { margin-bottom: 1px; border-left: 2px solid transparent; padding-left: 6px; }
        .log-info { border-left-color: #007bff; }
        .log-success { border-left-color: #28a745; color: #a3d9a5; }
        .log-error { border-left-color: #dc3545; color: #f8d7da; }
        .log-result { border-left-color: #ffc107; color: #fff3cd; background: rgba(255, 193, 7, 0.1); }
        
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-running { background-color: #28a745; box-shadow: 0 0 5px #28a745; animation: blink 1s infinite; }
        .status-stopped { background-color: #6c757d; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        /* 搜索标签 */
        .search-tag { cursor: pointer; transition: all 0.2s; }
        .search-tag:hover { transform: translateY(-1px); }
        
        /* 结果详情 */
        .detail-row { background-color: #f8f9fa; display: none; }
        .detail-row.show { display: table-row; }
        .detail-pre { max-height: 200px; overflow-y: auto; font-size: 12px; background: #fff; border: 1px solid #dee2e6; padding: 10px; border-radius: 4px; }
        
        [v-cloak] { display: none !important; }
    </style>
</head>
<body>

    <div class="container-fluid" id="app" v-cloak>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-3" style="margin: -20px -20px 20px -20px;">
            <div class="container-fluid">
                <a class="navbar-brand" href="/admin/apis/"><i class="fas fa-arrow-left mr-2"></i> 接口管理</a>
                <div class="navbar-nav mx-auto">
                    <a class="nav-item nav-link text-light" href="/scraper/">
                        <i class="fas fa-search-plus mr-1"></i> 采集中心
                    </a>
                    <a class="nav-item nav-link active font-weight-bold" href="/capture/" style="border-bottom: 2px solid #fff;">
                        <i class="fas fa-crosshairs mr-1"></i> 抓包模式
                    </a>
                </div>
            </div>
        </nav>

        <div class="row">
            <!-- 左侧：控制面板与搜索辅助 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-gamepad mr-2"></i> 控制台
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label>测试手机号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" v-model="phone" placeholder="请输入用于接收验证码的手机号">
                            <small class="form-text text-muted">系统将只捕获含此手机号的请求。</small>
                        </div>
                        
                        <!-- <div class="form-group">
                            <div class="custom-control custom-checkbox">
                                <input type="checkbox" class="custom-control-input" id="checkSystemProfile" v-model="useSystemProfile">
                                <label class="custom-control-label" for="checkSystemProfile">
                                    使用系统默认浏览器环境 <span class="text-danger small">(需关闭所有 Edge/Chrome 窗口)</span>
                                </label>
                            </div>
                            <div class="alert alert-warning mt-2 p-2 small" v-if="useSystemProfile">
                                <i class="fas fa-exclamation-triangle"></i> <strong>关键提示：</strong><br>
                                如果您正使用 Edge 访问此页面，请务必改用 <strong>Chrome/Firefox</strong> 打开此控制台，然后关闭所有 Edge 窗口���否则会因“文件占用”导致启动失败。
                            </div>
                            <small class="form-text text-muted">勾选后将加载您现有的登录状态、插件和历史记录。</small>
                        </div> -->

                        <div class="form-group">
                            <label>搜索引擎 (多选)</label>
                            <div class="d-flex flex-wrap">
                                <div class="custom-control custom-checkbox mr-3">
                                    <input type="checkbox" class="custom-control-input" id="checkGoogle" value="google" v-model="selectedEngines">
                                    <label class="custom-control-label" for="checkGoogle">Google</label>
                                </div>
                                <div class="custom-control custom-checkbox mr-3">
                                    <input type="checkbox" class="custom-control-input" id="checkBing" value="bing" v-model="selectedEngines">
                                    <label class="custom-control-label" for="checkBing">Bing</label>
                                </div>
                                <div class="custom-control custom-checkbox mr-3">
                                    <input type="checkbox" class="custom-control-input" id="checkBaidu" value="baidu" v-model="selectedEngines">
                                    <label class="custom-control-label" for="checkBaidu">Baidu</label>
                                </div>
                                <div class="custom-control custom-checkbox mr-3">
                                    <input type="checkbox" class="custom-control-input" id="checkFofa" value="fofa" v-model="selectedEngines">
                                    <label class="custom-control-label" for="checkFofa">Fofa</label>
                                </div>
                                <div class="custom-control custom-checkbox mr-3">
                                    <input type="checkbox" class="custom-control-input" id="checkShodan" value="shodan" v-model="selectedEngines">
                                    <label class="custom-control-label" for="checkShodan">Shodan</label>
                                </div>
                                <div class="custom-control custom-checkbox mr-3">
                                    <input type="checkbox" class="custom-control-input" id="checkQuake" value="quake" v-model="selectedEngines">
                                    <label class="custom-control-label" for="checkQuake">Quake</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>高级搜索规则</label>
                            <div v-for="(rule, index) in searchRules" :key="index" class="input-group mb-2">
                                <div class="input-group-prepend">
                                    <select class="custom-select" v-model="rule.type" style="width: 80px;">
                                        <option value="text">全文</option>
                                        <option value="title">标题</option>
                                        <option value="url">URL</option>
                                        <option value="body">正文</option>
                                        <option value="site">域名</option>
                                    </select>
                                </div>
                                <input type="text" class="form-control" v-model="rule.value" placeholder="关键词">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-danger" type="button" @click="removeRule(index)" v-if="searchRules.length > 1">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                            <button class="btn btn-sm btn-outline-primary btn-block dashed-btn" @click="addRule">
                                <i class="fas fa-plus"></i> 添加规则
                            </button>
                        </div>

                        <div class="d-flex justify-content-between mt-3">
                            <button class="btn btn-success btn-block mr-2" @click="startCapture" :disabled="isRunning || !phone">
                                <i class="fas fa-rocket mr-1"></i> 批量启动
                            </button>
                            <button class="btn btn-danger btn-block mt-0" @click="stopCapture" :disabled="!isRunning">
                                <i class="fas fa-stop mr-1"></i> 停止
                            </button>
                        </div>
                        
                        <div class="mt-3 text-center">
                            <span :class="['status-indicator', isRunning ? 'status-running' : 'status-stopped']"></span>
                            <span class="text-muted small">[[ isRunning ? '正在运行 - 请在弹出的浏览器中操作' : '已停止' ]]</span>
                        </div>
                    </div>
                </div>
                
                <!-- 日志 -->
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center py-2">
                        <span><i class="fas fa-terminal mr-2"></i> 系统日志</span>
                        <button class="btn btn-link btn-sm p-0 text-muted" @click="logs=[]">清空</button>
                    </div>
                    <div class="card-body p-0">
                        <div id="log-container" ref="logContainer">
                            <div v-for="(log, i) in logs" :key="i" :class="['log-entry', getLogClass(log.type)]">
                                <small class="text-muted mr-1">[[ log.time ]]</small>
                                <span>[[ log.message ]]</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：捕获结果 -->
            <div class="col-md-8">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap py-2">
                        <div class="d-flex align-items-center mb-2 mb-md-0">
                            <span class="mr-3 text-nowrap"><i class="fas fa-satellite-dish mr-2"></i> 捕获结果 ([[ filteredResults.length ]]/[[ results.length ]])</span>
                            <div class="input-group input-group-sm mr-2" style="width: 180px;">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fas fa-filter"></i></span>
                                </div>
                                <input type="text" class="form-control" v-model="filterText" placeholder="过滤 URL/标题...">
                            </div>
                            <div class="btn-group btn-group-sm">
                                <button type="button" class="btn" :class="filterStatus==='all'?'btn-secondary':'btn-outline-secondary'" @click="filterStatus='all'">全部</button>
                                <button type="button" class="btn" :class="filterStatus==='success'?'btn-success':'btn-outline-success'" @click="filterStatus='success'">成功</button>
                                <button type="button" class="btn" :class="filterStatus==='failed'?'btn-warning':'btn-outline-warning'" @click="filterStatus='failed'">失败</button>
                            </div>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-outline-danger mr-2" @click="results=[]" :disabled="results.length===0">
                                <i class="fas fa-trash mr-1"></i> 清空
                            </button>
                            <button class="btn btn-sm btn-primary" @click="importSelected" :disabled="selectedCount === 0 || isImporting">
                                <i v-if="isImporting" class="fas fa-spinner fa-spin mr-1"></i>
                                [[ isImporting ? '导入中...' : '导入 (' + selectedCount + ')' ]]
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0 table-responsive" style="height: 800px; overflow-y: auto;">
                        <table class="table table-hover mb-0" style="table-layout: fixed;">
                            <thead class="thead-light">
                                <tr>
                                    <th class="text-center" style="width: 50px; position: sticky; top: 0; z-index: 10; background-color: #e9ecef;">
                                        <input type="checkbox" v-model="selectAll" @change="toggleSelectAll">
                                    </th>
                                    <th style="width: 80px; position: sticky; top: 0; z-index: 10; background-color: #e9ecef;">方法</th>
                                    <th style="position: sticky; top: 0; z-index: 10; background-color: #e9ecef;">页面标题 / 接口 URL</th>
                                    <th style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #e9ecef;">操作</th>
                                    <th style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #e9ecef;">状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template v-for="(res, i) in filteredResults">
                                    <tr :key="'row-' + i" :class="{'table-active': res.showDetail}">
                                        <td class="text-center align-middle"><input type="checkbox" v-model="res.selected"></td>
                                        <td class="align-middle">
                                            <span :class="['badge', res.method === 'POST' ? 'badge-primary' : 'badge-success']">[[ res.method ]]</span>
                                        </td>
                                        <td class="align-middle" style="overflow: hidden;">
                                            <div class="font-weight-bold text-truncate" :title="res.desc">[[ res.desc ]]</div>
                                            <div class="small text-muted text-truncate" :title="res.url">[[ res.url ]]</div>
                                        </td>
                                        <td class="align-middle">
                                            <button class="btn btn-sm btn-outline-info py-0" @click="$set(res, 'showDetail', !res.showDetail)">
                                                [[ res.showDetail ? '收起' : '详情' ]]
                                            </button>
                                        </td>
                                        <td class="align-middle">
                                            <div class="d-flex flex-column align-items-start">
                                                <span v-if="res.imported" class="badge badge-success mb-1">已导入</span>
                                                <span v-else class="badge badge-secondary mb-1">待处理</span>
                                                <span v-if="res.status >= 200 && res.status < 300" class="badge badge-success">[[ res.status ]]</span>
                                                <span v-else-if="res.status" class="badge badge-warning">[[ res.status ]]</span>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr :key="'detail-' + i" :class="['detail-row', {'show': res.showDetail}]">
                                        <td colspan="5">
                                            <div class="p-2">
                                                <div class="row">
                                                    <div class="col-md-4">
                                                        <strong>Headers:</strong>
                                                        <pre class="detail-pre">[[ JSON.stringify(res.header, null, 2) ]]</pre>
                                                    </div>
                                                    <div class="col-md-4">
                                                        <strong>Data:</strong>
                                                        <pre class="detail-pre">[[ res.data ]]</pre>
                                                    </div>
                                                    <div class="col-md-4">
                                                        <strong>Response (Status: [[ res.status ]]):</strong>
                                                        <pre class="detail-pre">[[ res.response || 'No response captured' ]]</pre>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                                <tr v-if="results.length === 0">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <i class="fas fa-inbox fa-3x mb-3"></i><br>
                                        暂无捕获数据，请启动浏览器并触发发送验证码
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/popper/popper.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/bootstrap/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/vue/vue.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/axios/axios.min.js') }}"></script>

    <script>
        new Vue({
            el: '#app',
            delimiters: ['[[', ']]'],
            data: {
                phone: '',
                useSystemProfile: false,
                selectedEngines: ['google', 'fofa'],
                searchRules: [
                    { type: 'title', value: '注册' },
                    { type: 'text', value: '验证码' }
                ],
                
                isRunning: false,
                isImporting: false,
                logs: [],
                results: [],
                filterText: '',
                filterStatus: 'all', // all, success, failed
                selectAll: true,
                eventSource: null
            },
            computed: {
                filteredResults() {
                    return this.results.filter(r => {
                        // 状态筛选
                        if (this.filterStatus === 'success' && !(r.status >= 200 && r.status < 300)) return false;
                        if (this.filterStatus === 'failed' && (r.status >= 200 && r.status < 300)) return false;
                        
                        // 文本筛选
                        if (!this.filterText) return true;
                        const text = this.filterText.toLowerCase();
                        return (r.url && r.url.toLowerCase().includes(text)) ||
                               (r.desc && r.desc.toLowerCase().includes(text));
                    });
                },
                selectedCount() {
                    // 仅计算当前过滤后的选中项
                    return this.filteredResults.filter(r => r.selected && !r.imported).length;
                }
            },
            mounted() {
                // 恢复上次输入的手机号
                const savedPhone = localStorage.getItem('capture_phone');
                if(savedPhone) this.phone = savedPhone;
                
                this.startEventStream();
            },
            methods: {
                addRule() {
                    this.searchRules.push({ type: 'text', value: '' });
                },
                removeRule(index) {
                    this.searchRules.splice(index, 1);
                },
                generateUrls() {
                    const engines = {
                        'google': { url: 'https://www.google.com/search?q=', map: { text: '', title: 'intitle:', url: 'inurl:', body: 'intext:', site: 'site:' }, join: ' ' },
                        'bing':   { url: 'https://www.bing.com/search?q=',   map: { text: '', title: 'intitle:', url: 'inurl:', body: 'inbody:', site: 'site:' }, join: ' ' },
                        'baidu':  { url: 'https://www.baidu.com/s?wd=',      map: { text: '', title: 'intitle:', url: 'inurl:', body: '', site: 'site:' }, join: ' ' },
                        'fofa':   { url: 'https://fofa.info/result?qbase64=', map: { text: '', title: 'title=', url: '', body: 'body=', site: 'domain=' }, join: ' && ', quote: true, base64: true },
                        'shodan': { url: 'https://www.shodan.io/search?query=', map: { text: '', title: 'http.title:', url: '', body: 'http.html:', site: 'hostname:' }, join: ' ', quote: true },
                        'quake':  { url: 'https://quake.360.net/quake/#/searchResult?search_guide=', map: { text: '', title: 'title:', url: '', body: 'response:', site: 'domain:' }, join: ' AND ', quote: true },
                    };
                    
                    // 过滤空规则
                    const validRules = this.searchRules.filter(r => r.value && r.value.trim());
                    if (validRules.length === 0) return [];
                    
                    const urls = [];
                    
                    this.selectedEngines.forEach(engineKey => {
                        const engine = engines[engineKey];
                        if (!engine) return;
                        
                        let queryParts = [];
                        
                        validRules.forEach(rule => {
                            let prefix = engine.map[rule.type];
                            if (prefix === undefined) prefix = ''; // 不支持的类型降级为全文搜索
                            
                            let val = rule.value.trim();
                            
                            // 特殊处理引号
                            if (engine.quote) {
                                val = `"${val}"`;
                            }
                            
                            queryParts.push(`${prefix}${val}`);
                        });
                        
                        let query = queryParts.join(engine.join);
                        
                        // Fofa 需要 Base64 编码
                        if (engine.base64) {
                            query = btoa(unescape(encodeURIComponent(query)));
                        } else {
                            query = encodeURIComponent(query);
                        }
                        
                        urls.push(engine.url + query);
                    });
                    
                    return urls;
                },
                startEventStream() {
                    if (this.eventSource) this.eventSource.close();
                    
                    this.eventSource = new EventSource('/api/capture/events/');
                    
                    this.eventSource.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            this.handleEvent(data);
                        } catch(e) {
                            // console.log('Keep-alive or error', e);
                        }
                    };
                },
                handleEvent(data) {
                    if (data.type === 'log' || data.type === 'error' || data.type === 'status') {
                        if (data.type === 'status' && data.message === 'stopped') {
                            this.isRunning = false;
                            this.appendLog('抓包会话已结束', 'info');
                        } else {
                            this.appendLog(data.message, data.type);
                        }
                    } else if (data.type === 'result') {
                        // 新增结果，默认选中
                        const newResult = {
                            ...data.data,
                            selected: true,
                            imported: false,
                            showDetail: false
                        };
                        this.results.unshift(newResult);
                        
                        // 限制列表长度，防止浏览器卡顿 (保留最新的 1000 条)
                        if (this.results.length > 1000) {
                            this.results.pop();
                        }
                        
                        this.appendLog(data.message, 'result');
                    }
                },
                startCapture() {
                        if (!this.phone) return alert('请输入手机号');
                    localStorage.setItem('capture_phone', this.phone);
                    
                    const urls = this.generateUrls();
                    if (urls.length === 0) {
                        if (!confirm('未选择搜索引擎或关键词，将只打开空白页。继续？')) return;
                    }
                    
                    this.isRunning = true;
                    // this.results = []; // 可选：启动时清空旧结果
                    
                    axios.post('/api/capture/start/', {
                        phone: this.phone,
                        initial_urls: urls,
                        use_system_profile: this.useSystemProfile
                    }).then(res => {
                        if (res.data.status === 0) {
                            this.appendLog(`正在启动浏览器，将打开 ${urls.length} 个标签页...`, 'info');
                        } else {
                            this.isRunning = false;
                            alert('启动失败: ' + res.data.resp);
                        }
                    }).catch(err => {
                        this.isRunning = false;
                        alert('请求错误: ' + err.message);
                    });
                },
                stopCapture() {
                    axios.post('/api/capture/stop/').then(() => {
                        this.appendLog('正在停止...', 'info');
                    });
                },
                importSelected() {
                    const selected = this.results.filter(r => r.selected && !r.imported);
                    if (selected.length === 0) return;
                    
                    this.isImporting = true;
                    
                    // 预处理数据：替换 [phone]
                    const apisToImport = selected.map(item => {
                        let headerStr = JSON.stringify(item.header);
                        let dataStr = item.data;
                        let urlStr = item.url;
                        
                        // 1. 替换原始手机号
                        const phoneRegex = new RegExp(this.phone, 'g');
                        
                        // 2. 替换 URL 编码后的手机号 (如 138%2000%200000)
                        const encodedPhone = encodeURIComponent(this.phone);
                        const encodedPhoneRegex = new RegExp(encodedPhone, 'g');

                        if (typeof dataStr === 'string') {
                            dataStr = dataStr.replace(phoneRegex, '[phone]').replace(encodedPhoneRegex, '[phone]');
                        }
                        urlStr = urlStr.replace(phoneRegex, '[phone]').replace(encodedPhoneRegex, '[phone]');
                        
                        return {
                            desc: item.desc, 
                            url: urlStr,
                            method: item.method,
                            header: item.header, 
                            data: dataStr
                        };
                    });
                    
                    axios.post('/api/scraper/import/', { apis: apisToImport }).then(res => {
                        if (res.data.status === 0) {
                            this.appendLog(`成功导入 ${res.data.success_count} 个接口`, 'success');
                            // 标记为已导入
                            selected.forEach(r => r.imported = true);
                            this.selectAll = false;
                        } else {
                            alert('导入失败: ' + res.data.resp);
                        }
                    }).finally(() => {
                        this.isImporting = false;
                    });
                },
                toggleSelectAll() {
                    // 仅切换当前过滤列表中的项
                    this.filteredResults.forEach(r => {
                        if (!r.imported) r.selected = this.selectAll;
                    });
                },
                appendLog(message, type = 'info') {
                    const time = new Date().toLocaleTimeString();
                    this.logs.push({ time, message, type });
                    this.$nextTick(() => {
                        const container = this.$refs.logContainer;
                        if(container) container.scrollTop = container.scrollHeight;
                    });
                },
                getLogClass(type) {
                    return 'log-' + (type || 'info');
                }
            },
            beforeDestroy() {
                if (this.eventSource) this.eventSource.close();
            }
        });
    </script>
</body>
</html>
