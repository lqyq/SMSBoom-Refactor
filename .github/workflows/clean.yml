name: 🔥 Clean SMSBoom Logs

# 这个脚本的作用是：一键删除所有 Actions 运行记录
# 用于清理 SMSBoom 产生的堆积日志

on:
  workflow_dispatch:  # 仅支持手动点击运行

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # 需要写入权限来删除记录
      contents: read
    steps:
      - name: Delete all workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 使用默认令牌
          repository: ${{ github.repository }}
          retain_days: 0             # 保留天数：0（不保留）
          keep_minimum_runs: 0       # 最少保留数量：0（全部删除）
          delete_workflow_by_state_pattern: "ALL" # 删除所有状态
          delete_run_by_conclusion_pattern: "ALL" # 删除所有结果
