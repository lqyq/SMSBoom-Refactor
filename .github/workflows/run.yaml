name: 🚀 Run SMSBoom in Action

# 触发 Action 的条件
on: 
  # 定时触发 (注意：GitHub Actions 的 schedule 有延迟，可能不会精确到秒)
  schedule:
      - cron: '*/10 * * * *'
  # 手动触发
  workflow_dispatch:

# === 核心修复：并发控制 ===
# 这行代码确保同一时间只有一个该工作流在运行。
# 如果新的任务触发，旧的正在运行的任务会被取消，防止堆积。
concurrency: 
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # 检查 NUMBER secret 变量是否存在
  check:
    runs-on: ubuntu-latest
    outputs:
      has_number: ${{ steps.check_number.outputs.has_number }}
    steps:
      - name: Check NUMBER secret
        id: check_number
        env:
          NUMBER: ${{ secrets.NUMBER }}
        run: |
          if [ -n "$NUMBER" ]; then
            echo "has_number=true" >> $GITHUB_OUTPUT
          else
            echo "has_number=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.has_number == 'true'
    runs-on: ubuntu-latest
    
    # === 核心修复：设置时区为上海时间 ===
    # 否则 cron 表达式会按照 UTC 时间执行，导致比你预期的晚8小时
    env:
      TZ: Asia/Shanghai

    steps:
      # 签出项目代码
      - uses: actions/checkout@v4

      - name: Checkout api.json
        run: |
          git fetch --no-tags --depth=1 origin feature
          git checkout FETCH_HEAD -- api.json

      # 设置 py3.8 环境
      - name: 🚀 Set up Python 3.x
        uses: actions/setup-python@v3
        with:
          python-version: '3.8'
      
      - name: 🚀 Run SMSBoom Script
        # 此处可以自定义命令行运行参数
        run: |
          pip3 install -r requirements.txt
          # 打印手机号掩码用于调试（可选）
          echo ${{ secrets.NUMBER }} | sed 's/./& /g'
          python3 smsboom.py run -p ${{ secrets.NUMBER }} -t 3
